<!doctype html>
<html lang="pt-BR">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Health - Sistema Interno</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    body {
      box-sizing: border-box;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

   html, body {
  width: 800px;
  height: 540px;
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: transparent;
}


    .login-wrapper {
  width: 800px;
  height: 540px;
  display: flex;
  align-items: center;
  justify-content: center;
}

    .login-container {
  width: 800px;
  height: 540px;
  display: flex;
  background: #ffffff;
  border-radius: 0;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(10, 31, 68, 0.15);
}

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Left Side - Login Form */
    .login-form-side {
      flex: 1 1 0;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      padding: 32px 40px;
      position: relative;
      min-width: 300px;
      box-sizing: border-box;
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      animation: fadeIn 0.8s ease-out 0.2s both;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-icon {
      width: 70px;
      height: 70px;
      object-fit: contain;
    }

    .logo-text {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #0A1F44;
    }

    .form-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-header {
      margin-bottom: 24px;
      animation: fadeIn 0.8s ease-out 0.3s both;
    }

    .form-title {
      font-size: 24px;
      font-weight: 700;
      color: #0A1F44;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }

    .form-subtitle {
      font-size: 13px;
      color: #6B7280;
      font-weight: 400;
      line-height: 1.5;
    }

    .input-group {
      margin-bottom: 16px;
      animation: fadeIn 0.8s ease-out 0.5s both;
    }

    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      letter-spacing: 0.2px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      opacity: 0.4;
      transition: opacity 0.2s ease;
    }

    .form-input {
      width: 100%;
      padding: 11px 14px 11px 42px;
      border: 1.5px solid #E5E7EB;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      background: #F9FAFB;
      color: #1F2937;
    }

    .form-input:focus {
      outline: none;
      border-color: #1E5ED6;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(30, 94, 214, 0.08);
    }

    .form-input:focus + .input-icon {
      opacity: 0.7;
    }

    .form-input::placeholder {
      color: #9CA3AF;
    }

    .remember-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 2px;
      margin-bottom: 6px;
      font-size: 13px;
      color: #374151;
      animation: fadeIn 0.8s ease-out 0.6s both;
    }

    .remember-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .remember-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #1E5ED6;
    }

    .submit-button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #123B7A 0%, #1E5ED6 100%);
      border: none;
      border-radius: 10px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 16px rgba(30, 94, 214, 0.25);
      margin-top: 8px;
      animation: fadeIn 0.8s ease-out 0.7s both;
      letter-spacing: 0.3px;
    }

    .submit-button:hover {
      background: linear-gradient(135deg, #0d2f63 0%, #1850c4 100%);
      box-shadow: 0 6px 20px rgba(30, 94, 214, 0.4);
      transform: translateY(-2px) scale(1.02);
    }

    .submit-button:active {
      transform: translateY(0) scale(0.98);
    }

    /* Right Side - Premium IA Area */
    .premium-side {
      flex: 1 1 0;
      background: linear-gradient(165deg, #0A1F44 0%, #123B7A 50%, #1E5ED6 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 4vw, 40px);
      min-width: 280px;
      box-sizing: border-box;
    }

    .premium-side {
  border-top-right-radius: 14px;
  border-bottom-right-radius: 14px;
}

    /* Animated Background Shapes */
    .bg-shape {
      position: absolute;
      opacity: 0.06;
      animation: floatShapeSubtle 25s ease-in-out infinite;
    }

    .bg-shape:nth-child(1) {
      width: 200px;
      height: 200px;
      background: #ffffff;
      border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
      top: -40px;
      left: -30px;
      animation-delay: 0s;
    }

    .bg-shape:nth-child(2) {
      width: 150px;
      height: 150px;
      background: #2EC4A6;
      border-radius: 50%;
      bottom: -30px;
      right: -20px;
      animation-delay: 8s;
    }

    .bg-shape:nth-child(3) {
      width: 120px;
      height: 120px;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 30% 70% 70% 30% / 60% 40% 60% 40%;
      top: 40%;
      right: -20px;
      animation-delay: 15s;
    }

    @keyframes floatShapeSubtle {
      0%, 100% {
        transform: translate(0, 0) rotate(0deg);
      }
      33% {
        transform: translate(-10px, -15px) rotate(3deg);
      }
      66% {
        transform: translate(5px, -20px) rotate(-3deg);
      }
    }

    /* Hero Content */
    .hero-content {
      position: relative;
      z-index: 10;
      text-align: center;
      backdrop-filter: blur(8px);
      background: rgba(255, 255, 255, 0.02);
      padding: 44px 36px;
      border-radius: 0;
      border: 1px solid rgba(255, 255, 255, 0.08);
      animation: fadeIn 1s ease-out 0.4s both;
    }

    .hero-icon-wrapper {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: clamp(70px, 22vw, 180px);
      height: clamp(70px, 22vw, 180px);
      margin-bottom: 24px;
      position: relative;
      animation: pulseGlowSubtle 4s ease-in-out infinite;
    }

    @keyframes pulseGlowSubtle {
      0%, 100% {
        filter: drop-shadow(0 0 12px rgba(46, 196, 166, 0.35));
      }
      50% {
        filter: drop-shadow(0 0 20px rgba(30, 94, 214, 0.4));
      }
    }

    .hero-icon {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .hero-title {
      font-size: 26px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .hero-subtitle {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.82);
      font-weight: 400;
      line-height: 1.6;
      max-width: 280px;
      margin: 0 auto;
    }

   

      
  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="https://cdn.tailwindcss.com" type="text/javascript"></script>
 </head>
 <body>
  <div class="login-wrapper">
   <div class="login-container" style="visibility:hidden;"><!-- Left Side - Login Form -->
    <div class="login-form-side">
     <div class="logo-section"><img src="img/logo-color.png" alt="" class="logo-icon"> 
     </div>
     <div class="form-content">
      <div class="form-header">
       <h1 class="form-title" id="formTitle">Bem-vindo</h1>
       <p class="form-subtitle" id="formSubtitle">Acesso restrito para equipe interna</p>
      </div>
      <form id="loginForm">
       <div class="input-group"><label for="username" id="usernameLabel">UsuÃ¡rio</label>
        <div class="input-wrapper"><input type="text" id="username" class="form-input" placeholder="Digite seu usuÃ¡rio" required autocomplete="username">
         <svg class="input-icon" viewbox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10 10C12.0711 10 13.75 8.32107 13.75 6.25C13.75 4.17893 12.0711 2.5 10 2.5C7.92893 2.5 6.25 4.17893 6.25 6.25C6.25 8.32107 7.92893 10 10 10Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" /> <path d="M17.0834 17.5C17.0834 14.2783 13.9052 11.6667 10.0001 11.6667C6.09494 11.6667 2.91675 14.2783 2.91675 17.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
         </svg>
        </div>
       </div>
       <div class="input-group"><label for="password" id="passwordLabel">Senha</label>
        <div class="input-wrapper"><input type="password" id="password" class="form-input" placeholder="Digite sua senha" required autocomplete="current-password">
         <svg class="input-icon" viewbox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M15.8333 8.33333H4.16667C3.24619 8.33333 2.5 9.07952 2.5 10V15.8333C2.5 16.7538 3.24619 17.5 4.16667 17.5H15.8333C16.7538 17.5 17.5 16.7538 17.5 15.8333V10C17.5 9.07952 16.7538 8.33333 15.8333 8.33333Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" /> <path d="M5.83333 8.33333V5C5.83333 4.11594 6.18452 3.2681 6.80964 2.64298C7.43477 2.01786 8.28261 1.66667 9.16667 1.66667H10.8333C11.7174 1.66667 12.5652 2.01786 13.1904 2.64298C13.8155 3.2681 14.1667 4.11594 14.1667 5V8.33333" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
         </svg>
        </div>
       </div>
       <div class="remember-group">
        <label class="remember-label" for="rememberMe">
         <input type="checkbox" id="rememberMe">
         <span>Lembrar-me neste computador</span>
        </label>
       </div>
      <button
  type="submit"
  class="submit-button"
  id="submitButton">Acessar Sistema</button>
      </form>
     </div>
    </div><!-- Right Side - Premium IA Area -->
    <div class="premium-side"><!-- Animated Background Shapes -->
     <div class="bg-shape"></div>
     <div class="bg-shape"></div>
     <div class="bg-shape"></div><!-- Hero Content -->
     <div class="hero-content">
      <div class="hero-icon-wrapper">
        <img src="img/logo.png" alt="">
          <stop stop-color="#1E5ED6" />
          <stop offset="1" stop-color="#2EC4A6" />
         </lineargradient>
        </defs>
       </svg>
      </div>
      <h2 class="hero-title" id="aiTitle">IA Master Health</h2>
      <p class="hero-subtitle" id="aiSubtitle">Assistente interna para suporte e dÃºvidas da equipe mÃ©dica</p>
     </div>
    </div>
   </div>
  </div>
  <script>
    const defaultConfig = {
        logo_text: 'Master Health',
        form_title: 'Bem-vindo',
        form_subtitle: 'Acesso restrito para equipe interna',
        username_label: 'Usuário',
        password_label: 'Senha',
        button_text: 'Acessar Sistema',
        ai_title: 'IA Master Health',
        ai_subtitle: 'Assistente interna para suporte e dúvidas da equipe médica',
        gradient_start: '#123B7A',
        gradient_end: '#1E5ED6',
        accent_color: '#2EC4A6',
        text_color: '#0A1F44',
        font_family: 'Inter',
        font_size: 14
    };

    // FunÃ§Ã£o de configuraÃ§Ã£o do SDK (Mantida conforme seu original)
    async function onConfigChange(config) {
        const baseSize = config.font_size || defaultConfig.font_size;
        const customFont = config.font_family || defaultConfig.font_family;
        const baseFontStack = '-apple-system, BlinkMacSystemFont, sans-serif';

        const safeSetText = (id, text) => {
            const el = document.getElementById(id);
            if (el) el.textContent = text;
        };

        safeSetText('formTitle', config.form_title || defaultConfig.form_title);
        safeSetText('formSubtitle', config.form_subtitle || defaultConfig.form_subtitle);
        safeSetText('usernameLabel', config.username_label || defaultConfig.username_label);
        safeSetText('passwordLabel', config.password_label || defaultConfig.password_label);
        safeSetText('submitButton', config.button_text || defaultConfig.button_text);
        safeSetText('aiTitle', config.ai_title || defaultConfig.ai_title);
        safeSetText('aiSubtitle', config.ai_subtitle || defaultConfig.ai_subtitle);

        document.querySelector('.premium-side').style.background = `linear-gradient(165deg, #0A1F44 0%, ${config.gradient_start || defaultConfig.gradient_start} 50%, ${config.gradient_end || defaultConfig.gradient_end} 100%)`;
        document.querySelector('.submit-button').style.background = `linear-gradient(135deg, ${config.gradient_start || defaultConfig.gradient_start} 0%, ${config.gradient_end || defaultConfig.gradient_end} 100%)`;
        document.body.style.fontFamily = `${customFont}, ${baseFontStack}`;
    }

    // InicializaÃ§Ã£o do SDK
    if (window.elementSdk) {
        window.elementSdk.init({
            defaultConfig,
            onConfigChange,
            mapToCapabilities: (config) => ({ /* Seus mapeamentos aqui... */ }),
            mapToEditPanelValues: (config) => new Map([ /* Seus valores aqui... */ ])
        });
    }

    // --- SESSÃO PERSISTENTE ---
    function mostrarLogin() {
        const container = document.querySelector('.login-container');
        if (container) container.style.visibility = 'visible';

        // Reset UI state when returning to login
        const button = document.getElementById('submitButton');
        if (button) {
            button.textContent = 'Acessar Sistema';
            button.disabled = false;
        }
        const password = document.getElementById('password');
        if (password) password.value = '';
    }

    let pyReady = false;
    window.addEventListener('pywebviewready', async function () {
        pyReady = true;
        try {
            const result = await window.pywebview.api.verificar_sessao();
            if (!result || !result.valido) {
                mostrarLogin();
            }
        } catch (err) {
            console.error(err);
            mostrarLogin();
        }
    });

    // --- FORMULÃRIO ÃšNICO E CORRIGIDO ---
    document.getElementById('loginForm').addEventListener('submit', async function (e) {
    e.preventDefault();

    const button = document.getElementById('submitButton');
    const usuario = document.getElementById('username').value.trim();
    const senha = document.getElementById('password').value.trim();
    const lembrar = document.getElementById('rememberMe').checked;

    if (!usuario || !senha) {
        alert('Preencha usuÃ¡rio e senha');
        return;
    }

    if (!pyReady || !window.pywebview || !window.pywebview.api || !window.pywebview.api.login) {
        alert('API do aplicativo ainda nÃ£o carregou. Aguarde alguns segundos e tente novamente.');
        return;
    }

    button.textContent = 'Autenticando...';
    button.disabled = true;

    try {
        const result = await window.pywebview.api.login(usuario, senha, lembrar);

        if (!result.success) {
            alert(result.message);
            button.textContent = 'Acessar Sistema';
            button.disabled = false;
            return;
        }

        // âœ… sucesso â†’ Python abre as telas
    } catch (err) {
        const detail = (err && (err.message || err.toString())) ? (err.message || err.toString()) : '';
        alert(detail ? `Erro ao conectar com o sistema: ${detail}` : 'Erro ao conectar com o sistema');
        console.error('Falha no login via pywebview:', err);
        button.textContent = 'Acessar Sistema';
        button.disabled = false;
    }
});
</script></body>
</html>
